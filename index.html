<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play of Rasiya | Q&A with Answers</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #060913;
            --panel-bg: #0f1626;
            --neon-blue: #00d2fe;
            --neon-purple: #9d4edd;
            --neon-green: #22c55e;
            --text-light: #f3f4f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: radial-gradient(circle at center, #161233, var(--bg-dark));
            color: var(--text-light); min-height: 100vh; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .main-box {
            max-width: 550px; width: 100%;
            background: var(--panel-bg); border-radius: 24px; padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 25px rgba(0, 210, 254, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header h1 {
            font-family: 'Orbitron', sans-serif; font-size: 1.7rem; font-weight: 900;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .header p { color: #9ca3af; font-size: 0.85rem; margin-top: 5px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid #1f2937; padding-bottom: 10px; }
        .tab-btn {
            background: transparent; border: none; color: #9ca3af; padding: 8px 16px;
            cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: 0.2s;
        }
        .tab-btn.active { color: var(--neon-blue); border-bottom: 2px solid var(--neon-blue); }

        .view-panel { display: none; }
        .view-panel.active { display: block; }

        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .input-group label { font-size: 0.85rem; font-weight: 600; color: #9ca3af; }
        input, textarea {
            background: #172033; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 12px 15px; color: #fff; outline: none; font-size: 0.95rem;
        }
        input:focus, textarea:focus { border-color: var(--neon-blue); }
        textarea { resize: none; height: 100px; }

        .submit-btn {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            color: #fff; border: none; border-radius: 12px; padding: 14px;
            font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem;
            box-shadow: 0 4px 15px rgba(0, 210, 254, 0.3); transition: 0.2s;
        }
        .submit-btn:hover { transform: translateY(-2px); }

        /* Questions Stream and Cards */
        .questions-list { display: flex; flex-direction: column; gap: 20px; max-height: 450px; overflow-y: auto; padding-right: 5px; }
        .q-card {
            background: rgba(255,255,255,0.02); border-radius: 16px; padding: 15px;
            border: 1px solid rgba(255,255,255,0.05); border-left: 4px solid var(--neon-purple);
            animation: fadeIn 0.3s ease;
        }
        .q-meta { display: flex; justify-content: space-between; font-size: 0.78rem; color: #6b7280; margin-bottom: 8px; }
        .q-author { font-weight: bold; color: var(--neon-blue); }
        .q-text { font-size: 0.95rem; color: #e5e7eb; word-break: break-word; margin-bottom: 10px; }

        /* Rasiya's Official Answer Box Styling */
        .ans-box {
            background: rgba(34, 197, 94, 0.08); border-radius: 10px; padding: 10px 12px;
            border-left: 3px solid var(--neon-green); margin-top: 10px;
        }
        .ans-header { font-size: 0.8rem; font-weight: bold; color: var(--neon-green); margin-bottom: 2px; }
        .ans-text { font-size: 0.9rem; color: #f3f4f6; }

        /* Admin Action Inline Reply Form */
        .reply-form { display: flex; gap: 8px; margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
        .reply-input { flex: 1; padding: 8px 12px; font-size: 0.85rem; border-radius: 8px; }
        .reply-btn { background: var(--neon-green); color: #000; border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.85rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="main-box">
        <div class="header">
            <h1>Rasiya Hub Q&A</h1>
            <p>Ask a question, and check back later to see Rasiya's answer!</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('ask')"><i class="fa-solid fa-comments"></i> User Q&A Portal</button>
            <button class="tab-btn" onclick="switchTab('admin')"><i class="fa-solid fa-lock"></i> Rasiya Admin Area</button>
        </div>

        <div id="askPanel" class="view-panel active">
            <div style="background: rgba(255,255,255,0.02); padding: 15px; border-radius: 16px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05);">
                <div class="input-group" style="margin-bottom: 12px;">
                    <input type="text" id="senderName" placeholder="Your Name (Optional)" maxlength="25">
                </div>
                <div class="input-group" style="margin-bottom: 12px;">
                    <textarea id="questionText" placeholder="ඔයාගේ ප්‍රශ්නය මෙතන ලියන්න..."></textarea>
                </div>
                <button class="submit-btn" onclick="submitQuestion()">Submit Question <i class="fa-solid fa-paper-plane"></i></button>
            </div>

            <h3 style="font-size: 1rem; margin-bottom: 12px; color: var(--neon-blue); font-family: 'Orbitron';">Recent QA Feed</h3>
            <div class="questions-list" id="publicQuestionsList">
                </div>
        </div>

        <div id="adminPanel" class="view-panel">
            <div class="input-group" id="authBox">
                <label>Enter Secret Dashboard Pin</label>
                <div style="display: flex; gap: 10px;">
                    <input type="password" id="adminPin" placeholder="Enter Secret Pin" style="flex:1;">
                    <button class="submit-btn" onclick="unlockDashboard()" style="width:auto; padding: 0 20px;">Unlock</button>
                </div>
            </div>
            
            <div class="questions-list" id="adminQuestionsList" style="display: none;">
                </div>
        </div>
    </div>

    <script>
        // ⚠️ මෙතනට ඔයාගේ FIREBASE CONFIG විස්තර ටික දාන්න ⚠️
        const firebaseConfig = {
             apiKey: "AIzaSyAUArWvMbMbiU9OPx2eWBrqZ8N_wSuGoDg",
  authDomain: "rasiyaaq.firebaseapp.com",
  projectId: "rasiyaaq",
  storageBucket: "rasiyaaq.firebasestorage.app",
  messagingSenderId: "302258992367",
  appId: "1:302258992367:web:089b7e229b1670e222d71a",
  measurementId: "G-5K44BPJKGC"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const qRef = database.ref('live_qa');

        const SECRET_PIN = "1234"; // 🔒 ඔයාගේ රහස් අංකය
        let isAdminUnlocked = false;

        function switchTab(type) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.view-panel').forEach(pnl => pnl.classList.remove('active'));

            if(type === 'ask') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('askPanel').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('adminPanel').classList.add('active');
            }
        }

        // Action: Push User Question Data Package to Firebase Cloud
        function submitQuestion() {
            let author = document.getElementById('senderName').value.trim();
            const text = document.getElementById('questionText').value.trim();

            if(!author) author = "Anonymous";
            if(!text) return alert("Type a question!");

            qRef.push({
                name: author,
                message: text,
                answer: "", // Empty initial answer field space holder
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            }).then(() => {
                alert("Question submitted! 🚀");
                document.getElementById('questionText').value = "";
            });
        }

        // Action: Verify Pin to Unlock Dash
        function unlockDashboard() {
            if(document.getElementById('adminPin').value === SECRET_PIN) {
                isAdminUnlocked = true;
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('adminQuestionsList').style.display = 'flex';
                syncDataStreams();
            } else {
                alert("Invalid Admin Pin!");
            }
        }

        // Action: Submit Admin Reply Text to Cloud Node Node
        function submitAnswer(qId, inputId) {
            const replyText = document.getElementById(inputId).value.trim();
            if(!replyText) return alert("Type an answer first!");

            // Target the specific question node via ID and update answer value field
            qRef.child(qId).update({
                answer: replyText
            }).then(() => {
                alert("Answer posted! ✔️");
                document.getElementById(inputId).value = "";
            });
        }

        // Global Sync Stream Realtime Sync Engines
        function syncDataStreams() {
            const publicList = document.getElementById('publicQuestionsList');
            const adminList = document.getElementById('adminQuestionsList');

            // Listen to real-time additions/modifications from Cloud Database Node
            qRef.on('value', (snapshot) => {
                publicList.innerHTML = "";
                adminList.innerHTML = "";

                snapshot.forEach((childSnapshot) => {
                    const id = childSnapshot.key;
                    const data = childSnapshot.val();

                    // --- 1. Render Public Feed Cards ---
                    const pubCard = document.createElement('div');
                    pubCard.classList.add('q-card');
                    let pubAnswerHtml = data.answer ? `
                        <div class="ans-box">
                            <div class="ans-header"><i class="fa-solid fa-circle-check"></i> Rasiya Official Reply:</div>
                            <div class="ans-text">${escapeHtml(data.answer)}</div>
                        </div>` : '';
                    
                    pubCard.innerHTML = `
                        <div class="q-meta"><span class="q-author">${escapeHtml(data.name)}</span><span>${data.time}</span></div>
                        <div class="q-text">${escapeHtml(data.message)}</div>
                        ${pubAnswerHtml}
                    `;
                    publicList.insertBefore(pubCard, publicList.firstChild);

                    // --- 2. Render Protected Admin Action Cards ---
                    if(isAdminUnlocked) {
                        const admCard = document.createElement('div');
                        admCard.classList.add('q-card');
                        let inlineAnsTxt = data.answer ? `<p style="font-size:0.85rem; margin-top:5px; color:var(--neon-green)">Current Answer: ${escapeHtml(data.answer)}</p>` : '';

                        admCard.innerHTML = `
                            <div class="q-meta"><span class="q-author">${escapeHtml(data.name)}</span><span>ID: ${id}</span></div>
                            <div class="q-text">${escapeHtml(data.message)}</div>
                            ${inlineAnsTxt}
                            <div class="reply-form">
                                <input type="text" id="input_${id}" class="reply-input" placeholder="Type answer here...">
                                <button class="reply-btn" onclick="submitAnswer('${id}', 'input_${id}')">Reply</button>
                            </div>
                        `;
                        adminList.insertBefore(admCard, adminList.firstChild);
                    }
                });
            });
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        // Run default public interface data sink loader sync engine immediately
        syncDataStreams();
    </script>
</body>
</html>
